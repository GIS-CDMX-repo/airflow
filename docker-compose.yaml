version: "3.8"
x-airflow-common: &airflow-common-conf
  image: registry.gitlab.com/cicata/airflow:2.0.0
  environment: &airflow-common-env
    AIRFLOW_CONN_GITLAB_REGISTRY: ${AIRFLOW_CONN_GITLAB_REGISTRY}
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW__CORE__DEFAULT_TIMEZONE}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW_VAR_SETTLEMENTS_MAX_CLOUD_PERCENTAGE: ${AIRFLOW_VAR_SETTLEMENTS_MAX_CLOUD_PERCENTAGE}
    AIRFLOW_VAR_SETTLEMENTS_MAX_NODATA_PIXELS: ${AIRFLOW_VAR_SETTLEMENTS_MAX_NODATA_PIXELS}
    AIRFLOW_VAR_SETTLEMENTS_USERNAME: ${AIRFLOW_VAR_SETTLEMENTS_USERNAME}
    AIRFLOW_VAR_SETTLEMENTS_PASSWORD: ${AIRFLOW_VAR_SETTLEMENTS_PASSWORD}
    TZ: "America/Mexico_City"
  env_file:
    - .env
  networks:
    - airflow_network
  volumes:
    #- ./airflow/airflow_conf:/opt/airflow
    - /var/run/docker.sock:/var/run/docker.sock
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:alpine3.17
    container_name: postgres
    networks:
      - airflow_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - postgres_airflow_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s
  airflow-init-db:
    <<: *airflow-common-conf
    container_name: airflow-init-db
    command: ["db", "upgrade"]
    depends_on:
      postgres:
        condition: service_healthy
  rabbitmq:
    image: rabbitmq:3.11-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    env_file:
      - .env
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - airflow_network
    depends_on:
      airflow-init-db:
        condition: service_completed_successfully
  airflow-init-user:
    <<: *airflow-common-conf
    container_name: airflow-init-user
    command: [
      "users","create",
      "--username", "CICATA",
      "--password", "admin",
      "--firstname", "Antonio",
      "--lastname", "Briseno",
      "--role", "Admin",
      "--email", "red2013@hotmail.com"
    ]
    depends_on:
      airflow-init-db:
        condition: service_completed_successfully
  airflow-web:
    <<: *airflow-common-conf
    container_name: airflow-web
    command: ["webserver"]
    healthcheck:
      test: ["CMD", "curl" ,"--fail", "http://localhost:8080/home"]
      start_period: 30s
      retries: 5
      interval: 10s
    ports:
      - "8888:8080"
    depends_on:
      airflow-init-user:
        condition: service_completed_successfully
  airflow-scheduler:
    <<: *airflow-common-conf
    container_name: airflow-scheduler
    command: ["scheduler"]
    depends_on:
      airflow-web:
        condition: service_healthy
  airflow-worker:
    <<: *airflow-common-conf
    container_name: airflow-worker
    command: ["celery","worker"]
    depends_on:
      - airflow-scheduler

networks:
  airflow_network:
    driver: bridge
volumes:
  postgres_airflow_volume:
